<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delivery Planner | Dangerous Pretzel Co.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --mustard: #e8cf82;
      --devils-red: #da172a;
      --bg: #f8f6f2;
      --card: #fff;
      --text: #101820;
      --muted: #505050;
      --border: #e0ddd8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin: 0 0 8px;
      color: var(--text);
    }
    .sub {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 24px;
    }
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid var(--border);
    }
    .card h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 0 0 16px;
      color: var(--text);
    }
    .form-grid {
      display: grid;
      gap: 16px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 4px;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      font: inherit;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
    }
    textarea {
      min-height: 80px;
      resize: vertical;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--devils-red);
      box-shadow: 0 0 0 2px rgba(218, 23, 42, 0.15);
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 520px) {
      .row { grid-template-columns: 1fr; }
    }
    .btn {
      padding: 12px 24px;
      font: inherit;
      font-weight: 600;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: var(--devils-red);
      color: #fff;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:hover {
      background: #ba000a;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    #records-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    #records-list li {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.95rem;
      display: grid;
      gap: 4px;
    }
    #records-list li:last-child { border-bottom: none; }
    #records-list li .meta {
      color: var(--muted);
      font-size: 0.85rem;
    }
    #records-list li .sku { font-weight: 600; color: var(--devils-red); }
    #records-list .empty,
    #totals-by-sku .empty {
      padding: 32px;
      text-align: center;
      color: var(--muted);
    }
    #totals-by-sku {
      margin: 0;
      padding: 0;
    }
    .totals-date-group {
      margin-bottom: 20px;
    }
    .totals-date-group:last-child { margin-bottom: 0; }
    .totals-date {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin: 0 0 8px;
      padding-bottom: 4px;
      border-bottom: 2px solid var(--border);
    }
    .totals-date-sku-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .totals-date-sku-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.95rem;
    }
    .totals-date-sku-list li:last-child { border-bottom: none; }
    .totals-date-sku-list .sku-name { font-weight: 600; color: var(--text); }
    .totals-date-sku-list .sku-qty { font-weight: 700; color: var(--devils-red); }
    .type-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .type-badge.delivery { background: #e8f4ea; color: #1b5e20; }
    .type-badge.pickup { background: #e3f2fd; color: #0d47a1; }
    .error {
      color: var(--devils-red);
      font-size: 0.9rem;
      margin-top: 8px;
    }
    .line-items-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .line-items-head label { margin-bottom: 0; }
    .line-item-row {
      display: grid;
      grid-template-columns: 1fr 100px 40px;
      gap: 12px;
      align-items: end;
      margin-bottom: 12px;
    }
    .line-item-row .remove-row {
      padding: 10px;
      min-width: 40px;
      background: var(--border);
      color: var(--muted);
      font-size: 1.2rem;
      line-height: 1;
    }
    .line-item-row .remove-row:hover {
      background: var(--devils-red);
      color: #fff;
    }
    .btn-secondary {
      background: var(--border);
      color: var(--text);
    }
    .btn-secondary:hover { background: #ccc; }
    #line-items-container { margin-top: 8px; }
    .line-items-empty { color: var(--muted); font-size: 0.9rem; margin-bottom: 12px; }
    #records-list li .line-items { margin-top: 4px; }
    #records-list li .line-item { font-size: 0.9rem; }
    .record-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .record-actions .btn-icon {
      padding: 6px 12px;
      font-size: 0.85rem;
    }
    .record-actions .btn-edit { background: var(--muted); }
    .record-actions .btn-edit:hover { background: #333; }
    .record-actions .btn-delete { background: #c62828; }
    .record-actions .btn-delete:hover { background: #b71c1c; }
    .record-content { flex: 1; }
    #records-list li {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
    }
    #records-list li .record-content { min-width: 0; }
    .form-edit-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .form-edit-bar .cancel-edit {
      background: var(--border);
      color: var(--text);
    }
    .form-edit-bar .cancel-edit:hover { background: #ccc; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Delivery Planner</h1>
    <p class="sub">Schedule deliveries and pickups. Select a customer, then add SKU rows with quantities.</p>

    <div class="card">
      <h2>Schedule a delivery or pickup</h2>
      <form id="delivery-form" class="form-grid">
        <div>
          <label for="customer">Customer</label>
          <input type="text" id="customer" name="customer" required placeholder="Customer name or location" list="customer-list" autocomplete="off">
          <datalist id="customer-list"></datalist>
        </div>
        <div class="row">
          <div>
            <label for="date">Date</label>
            <input type="date" id="date" name="date" required>
          </div>
          <div>
            <label for="type">Type</label>
            <select id="type" name="type" required>
              <option value="">Select…</option>
              <option value="delivery">Delivery</option>
              <option value="pickup">Pickup</option>
            </select>
          </div>
        </div>
        <div class="line-items-head">
          <label>Line items (SKU + quantity)</label>
          <button type="button" class="btn btn-secondary" id="add-row-btn">+ Add row</button>
        </div>
        <div id="line-items-container">
          <p class="line-items-empty" id="line-items-empty">Add at least one SKU and quantity.</p>
        </div>
        <div id="form-error" class="error" role="alert" hidden></div>
        <div class="form-edit-bar">
          <button type="submit" class="btn" id="submit-btn">Schedule</button>
          <button type="button" class="btn cancel-edit" id="cancel-edit-btn" hidden>Cancel edit</button>
        </div>
        <input type="hidden" id="delivery-id" name="deliveryId" value="">
      </form>
    </div>

    <div class="card">
      <h2>Scheduled deliveries & pickups</h2>
      <ul id="records-list">
        <li class="empty">Loading…</li>
      </ul>
    </div>

    <div class="card">
      <h2>Totals by date</h2>
      <div id="totals-by-sku">
        <p class="empty">No data yet.</p>
      </div>
    </div>
  </div>

  <script type="module">
    import { fetchLog, appendLog } from '../scripts/sheet-logger.js';

    const LOG_PATH = '/dangpretz/delivery-planner';
    const form = document.getElementById('delivery-form');
    const recordsList = document.getElementById('records-list');
    const totalsBySkuList = document.getElementById('totals-by-sku');
    const lineItemsContainer = document.getElementById('line-items-container');
    const lineItemsEmpty = document.getElementById('line-items-empty');
    const addRowBtn = document.getElementById('add-row-btn');
    const formError = document.getElementById('form-error');
    const submitBtn = document.getElementById('submit-btn');
    const deliveryIdInput = document.getElementById('delivery-id');
    const cancelEditBtn = document.getElementById('cancel-edit-btn');

    let skus = [];

    function generateDeliveryId() {
      return typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : `del-${Date.now()}-${Math.random().toString(36).slice(2, 9)}`;
    }

    /** From raw log rows, resolve current deliveries (apply updates and deletes). */
    function resolveDeliveriesFromLogs(logs) {
      const byId = {};
      if (!Array.isArray(logs)) return [];
      logs.forEach((row, idx) => {
        const id = row.deliveryId || `legacy-${row.timeStamp || idx}`;
        if (row.action === 'delete') {
          delete byId[id];
          return;
        }
        if (row.action === 'update') {
          byId[id] = { ...row, deliveryId: id };
          return;
        }
        byId[id] = { ...row, deliveryId: id };
      });
      return Object.values(byId).sort((a, b) => {
        const d = (a.date || '').localeCompare(b.date || '');
        return d !== 0 ? d : (a.timeStamp || '').localeCompare(b.timeStamp || '');
      });
    }

    async function loadSkus() {
      const res = await fetch('skus.json');
      skus = await res.json();
    }

    const QUANTITY_OPTIONS = [];
    for (let n = 12; n <= 1200; n += 12) QUANTITY_OPTIONS.push(n);

    function buildSkuSelect() {
      const select = document.createElement('select');
      select.name = 'sku';
      select.setAttribute('data-line-sku', '');
      select.innerHTML = '<option value="">Select SKU…</option>';
      skus.forEach((sku) => {
        const opt = document.createElement('option');
        opt.value = sku;
        opt.textContent = sku;
        select.appendChild(opt);
      });
      return select;
    }

    function buildQuantitySelect(initialValue) {
      const select = document.createElement('select');
      select.name = 'quantity';
      select.setAttribute('data-line-qty', '');
      select.innerHTML = '<option value="">Qty</option>';
      const valueNum = Number(initialValue) || 0;
      const hasCustom = valueNum > 0 && !QUANTITY_OPTIONS.includes(valueNum);
      if (hasCustom) {
        const opt = document.createElement('option');
        opt.value = String(valueNum);
        opt.textContent = valueNum;
        select.appendChild(opt);
      }
      QUANTITY_OPTIONS.forEach((n) => {
        const opt = document.createElement('option');
        opt.value = String(n);
        opt.textContent = n;
        select.appendChild(opt);
      });
      if (valueNum > 0) select.value = String(valueNum);
      return select;
    }

    function addLineRow() {
      lineItemsEmpty.hidden = true;
      const row = document.createElement('div');
      row.className = 'line-item-row';
      row.innerHTML = '';
      const skuSelect = buildSkuSelect();
      const qtySelect = buildQuantitySelect('');
      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'btn remove-row';
      removeBtn.setAttribute('aria-label', 'Remove row');
      removeBtn.textContent = '−';
      removeBtn.addEventListener('click', () => {
        row.remove();
        if (!lineItemsContainer.querySelector('.line-item-row')) lineItemsEmpty.hidden = false;
      });
      row.append(skuSelect, qtySelect, removeBtn);
      lineItemsContainer.insertBefore(row, lineItemsEmpty);
    }

    function updateCustomerDatalist(deliveries) {
      const list = document.getElementById('customer-list');
      list.innerHTML = '';
      const names = new Set();
      if (Array.isArray(deliveries)) {
        deliveries.forEach((row) => {
          const name = (row.customer || row.location || '').trim();
          if (name) names.add(name);
        });
      }
      [...names].sort().forEach((name) => {
        const opt = document.createElement('option');
        opt.value = name;
        list.appendChild(opt);
      });
    }

    function showError(msg) {
      formError.textContent = msg || '';
      formError.hidden = !msg;
    }

    /** Returns { dateStr: { sku: totalQty } } for each day. */
    function totalsByDateFromDeliveries(deliveries) {
      const byDate = {};
      if (!Array.isArray(deliveries)) return byDate;
      deliveries.forEach((row) => {
        const dateStr = row.date && String(row.date).trim() || '—';
        const totals = byDate[dateStr] || (byDate[dateStr] = {});
        if (row.lineItems) {
          try {
            const items = JSON.parse(row.lineItems);
            if (Array.isArray(items)) {
              items.forEach((it) => {
                const sku = it.sku && String(it.sku).trim();
                const qty = Number(it.quantity) || 0;
                if (sku && qty > 0) totals[sku] = (totals[sku] || 0) + qty;
              });
            }
          } catch (_) { /* ignore */ }
        } else if (row.sku && (row.volume != null)) {
          const sku = String(row.sku).trim();
          const qty = Number(row.volume) || 0;
          if (sku && qty > 0) totals[sku] = (totals[sku] || 0) + qty;
        }
      });
      return byDate;
    }

    function formatDateLabel(dateStr) {
      if (!dateStr || dateStr === '—') return dateStr;
      try {
        const d = new Date(dateStr + 'T12:00:00');
        if (!Number.isNaN(d.getTime())) return d.toLocaleDateString(undefined, { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
      } catch (_) {}
      return dateStr;
    }

    function renderTotalsBySku(deliveries) {
      const byDate = totalsByDateFromDeliveries(deliveries);
      const dates = Object.keys(byDate).sort();
      if (dates.length === 0) {
        totalsBySkuList.innerHTML = '<p class="empty">No data yet.</p>';
        return;
      }
      totalsBySkuList.innerHTML = dates.map((dateStr) => {
        const totals = byDate[dateStr];
        const entries = Object.entries(totals).sort((a, b) => a[0].localeCompare(b[0]));
        const rows = entries.map(([sku, qty]) =>
          `<li><span class="sku-name">${escapeHtml(sku)}</span><span class="sku-qty">${escapeHtml(String(qty))}</span></li>`
        ).join('');
        return `<div class="totals-date-group"><h3 class="totals-date">${escapeHtml(formatDateLabel(dateStr))}</h3><ul class="totals-date-sku-list">${rows}</ul></div>`;
      }).join('');
    }

    function renderOneDelivery(row) {
      const type = (row.type || 'delivery').toLowerCase();
      const typeLabel = type === 'pickup' ? 'Pickup' : 'Delivery';
      const date = row.date || '—';
      const customer = row.customer || row.location || '—';
      let lineItemsHtml = '';
      if (row.lineItems) {
        try {
          const items = JSON.parse(row.lineItems);
          if (Array.isArray(items) && items.length) {
            lineItemsHtml = '<div class="line-items">' + items.map((it) =>
              `<span class="line-item">${escapeHtml(it.sku || '—')} × ${escapeHtml(String(it.quantity || 0))}</span>`
            ).join(', ') + '</div>';
          }
        } catch (_) { /* ignore */ }
      }
      if (!lineItemsHtml && (row.sku || row.volume)) {
        lineItemsHtml = `<div class="line-items"><span class="line-item">${escapeHtml(row.sku || '—')} × ${escapeHtml(String(row.volume || '—'))}</span></div>`;
      }
      if (!lineItemsHtml) lineItemsHtml = '<div class="line-items"><span class="line-item">—</span></div>';
      const id = escapeHtml(row.deliveryId || '');
      return `
        <li data-delivery-id="${id}">
          <div class="record-content">
            <span class="type-badge ${type}">${typeLabel}</span>
            <strong>${escapeHtml(customer)}</strong>
            <span class="meta">${escapeHtml(date)}</span>
            ${lineItemsHtml}
            <div class="record-actions">
              <button type="button" class="btn btn-icon btn-edit" data-action="edit" data-delivery-id="${id}">Edit</button>
              <button type="button" class="btn btn-icon btn-delete" data-action="delete" data-delivery-id="${id}">Delete</button>
            </div>
          </div>
        </li>
      `;
    }

    async function loadRecords() {
      try {
        const logs = await fetchLog(LOG_PATH);
        const deliveries = resolveDeliveriesFromLogs(logs);
        if (deliveries.length === 0) {
          recordsList.innerHTML = '<li class="empty">No scheduled deliveries or pickups yet.</li>';
          updateCustomerDatalist([]);
          renderTotalsBySku([]);
          return;
        }
        recordsList.innerHTML = deliveries.map((row) => renderOneDelivery(row)).join('');
        recordsList.querySelectorAll('[data-action="edit"]').forEach((btn) => {
          btn.addEventListener('click', () => startEdit(btn.dataset.deliveryId, deliveries));
        });
        recordsList.querySelectorAll('[data-action="delete"]').forEach((btn) => {
          btn.addEventListener('click', () => confirmDelete(btn.dataset.deliveryId));
        });
        updateCustomerDatalist(deliveries);
        renderTotalsBySku(deliveries);
      } catch (e) {
        recordsList.innerHTML = '<li class="empty">Could not load records. Check console.</li>';
        totalsBySkuList.innerHTML = '<p class="empty">—</p>';
        console.error('fetchLog error', e);
      }
    }

    function startEdit(deliveryId, deliveries) {
      const map = Object.fromEntries((deliveries || []).map((d) => [d.deliveryId, d]));
      const row = map[deliveryId];
      if (!row) return;
      form.customer.value = row.customer || row.location || '';
      form.date.value = row.date || '';
      form.type.value = (row.type || 'delivery').toLowerCase();
      lineItemsEmpty.hidden = true;
      lineItemsContainer.querySelectorAll('.line-item-row').forEach((r) => r.remove());
      let items = [];
      if (row.lineItems) {
        try {
          items = JSON.parse(row.lineItems);
          if (!Array.isArray(items)) items = [];
        } catch (_) {}
      } else if (row.sku && (row.volume != null)) {
        items = [{ sku: row.sku, quantity: Number(row.volume) || 0 }];
      }
      items.forEach((it) => {
        const lineRow = document.createElement('div');
        lineRow.className = 'line-item-row';
        const skuSelect = buildSkuSelect();
        skuSelect.value = it.sku || '';
        const qtySelect = buildQuantitySelect(it.quantity || 0);
        const removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.className = 'btn remove-row';
        removeBtn.setAttribute('aria-label', 'Remove row');
        removeBtn.textContent = '−';
        removeBtn.addEventListener('click', () => {
          lineRow.remove();
          if (!lineItemsContainer.querySelector('.line-item-row')) lineItemsEmpty.hidden = false;
        });
        lineRow.append(skuSelect, qtySelect, removeBtn);
        lineItemsContainer.insertBefore(lineRow, lineItemsEmpty);
      });
      deliveryIdInput.value = deliveryId;
      submitBtn.textContent = 'Update delivery';
      cancelEditBtn.hidden = false;
      showError('');
    }

    function clearEditState() {
      deliveryIdInput.value = '';
      submitBtn.textContent = 'Schedule';
      cancelEditBtn.hidden = true;
      form.reset();
      document.getElementById('date').value = new Date().toISOString().slice(0, 10);
      lineItemsEmpty.hidden = false;
      lineItemsContainer.querySelectorAll('.line-item-row').forEach((r) => r.remove());
    }

    function confirmDelete(deliveryId) {
      if (!deliveryId) return;
      if (!window.confirm('Delete this delivery?')) return;
      (async () => {
        try {
          await appendLog(LOG_PATH, { action: 'delete', deliveryId, timeStamp: new Date().toISOString() });
          await loadRecords();
        } catch (err) {
          showError('Failed to delete.');
          console.error(err);
        }
      })();
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    addRowBtn.addEventListener('click', addLineRow);

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      showError('');
      const customer = form.customer.value.trim();
      const date = form.date.value.trim();
      const type = form.type.value;
      const rows = lineItemsContainer.querySelectorAll('.line-item-row');
      const lineItems = [];
      rows.forEach((row) => {
        const sku = row.querySelector('[data-line-sku]').value;
        const qty = row.querySelector('[data-line-qty]').value.trim();
        if (sku && qty && Number(qty) > 0) lineItems.push({ sku, quantity: Number(qty) });
      });

      if (!customer || !date || !type) {
        showError('Please fill in customer, date, and type.');
        return;
      }
      if (lineItems.length === 0) {
        showError('Add at least one line item (SKU + quantity).');
        return;
      }

      submitBtn.disabled = true;
      const editingId = deliveryIdInput.value.trim();
      const timeStamp = new Date().toISOString();
      try {
        if (editingId) {
          await appendLog(LOG_PATH, {
            action: 'update',
            deliveryId: editingId,
            customer,
            date,
            type,
            lineItems: JSON.stringify(lineItems),
            timeStamp,
          });
        } else {
          await appendLog(LOG_PATH, {
            action: 'create',
            deliveryId: generateDeliveryId(),
            customer,
            date,
            type,
            lineItems: JSON.stringify(lineItems),
            timeStamp,
          });
        }
        clearEditState();
        await loadRecords();
      } catch (err) {
        showError('Failed to save. Try again.');
        console.error('appendLog error', err);
      } finally {
        submitBtn.disabled = false;
      }
    });

    cancelEditBtn.addEventListener('click', () => {
      clearEditState();
      showError('');
    });

    const today = new Date();
    document.getElementById('date').value = today.toISOString().slice(0, 10);

    (async () => {
      await loadSkus();
      loadRecords();
    })();
  </script>
</body>
</html>
