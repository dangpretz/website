<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Production | DPC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Paytone+One&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #C41E1E; --red-dk: #8B0000;
      --dark: #1A1A1A; --amber: #f0ad4e; --green: #2a7a2a;
      --white: #ffffff;
      --gray-1: #f5f5f5; --gray-2: #e8e8e8; --gray-3: #999999; --gray-4: #666666;
    }
    html { background: var(--dark); }
    body { font-family: 'Manrope', sans-serif; background: var(--dark); color: var(--dark); min-height: 100vh; }

    /* iOS zoom fix */
    input, select, textarea { font-size: 16px !important; }

    /* ── Top nav ─────────────────────────────────── */
    .topnav {
      position: sticky; top: 0; z-index: 100; background: var(--dark);
      border-bottom: 2px solid var(--red);
      display: flex; align-items: center; height: 60px;
    }
    .nav-arrow {
      width: 56px; height: 60px; border: none; background: none;
      color: var(--white); font-size: 32px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent; flex-shrink: 0;
    }
    .nav-arrow:active { background: rgba(255,255,255,0.08); }
    .date-display {
      flex: 1; text-align: center; cursor: pointer; padding: 4px 0;
      -webkit-tap-highlight-color: transparent;
    }
    .date-label {
      display: block; font-family: 'Paytone One', sans-serif;
      font-size: 17px; color: var(--white); line-height: 1.2;
    }
    .date-label.is-today { color: var(--amber); }
    .date-sub { display: block; font-size: 12px; color: var(--gray-3); margin-top: 1px; }
    .week-toggle {
      height: 60px; padding: 0 16px; border: none; background: none;
      color: var(--gray-3); font: 700 12px 'Manrope', sans-serif;
      text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer;
      -webkit-tap-highlight-color: transparent; flex-shrink: 0;
    }
    .week-toggle.active { color: var(--amber); }

    /* ── Page content ──────────────────────────── */
    .content { padding: 12px 12px 100px; max-width: 640px; margin: 0 auto; }

    /* ── Banners ───────────────────────────────── */
    .alert-banner {
      background: #fff3cd; color: #856404;
      border-radius: 10px; padding: 12px 16px;
      font: 600 14px 'Manrope', sans-serif; margin-bottom: 10px;
    }
    .alert-banner a { color: #856404; }
    .overdue-banner {
      background: #fff0f0; color: var(--red); border: 1px solid #ffcccc;
      border-radius: 10px; padding: 12px 16px;
      font: 600 14px 'Manrope', sans-serif; margin-bottom: 10px;
    }

    /* ── Team card ─────────────────────────────── */
    .team-card {
      background: var(--white); border-radius: 14px;
      margin-bottom: 12px; overflow: hidden;
    }
    .team-header {
      padding: 14px 16px 12px; border-bottom: 1px solid var(--gray-2);
      display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
    }
    .team-name { font-family: 'Paytone One', sans-serif; font-size: 19px; color: var(--dark); line-height: 1.2; }
    .team-date { font: 400 13px 'Manrope', sans-serif; color: var(--gray-4); margin-top: 3px; }
    .team-body { padding: 14px 16px; }

    /* ── Status badge ──────────────────────────── */
    .status-badge {
      flex-shrink: 0; padding: 5px 10px; border-radius: 20px;
      font: 700 12px 'Manrope', sans-serif; white-space: nowrap;
    }
    .badge-none    { background: var(--gray-2); color: var(--gray-4); }
    .badge-partial { background: #fff3cd; color: #856404; }
    .badge-done    { background: #d4edda; color: #155724; }
    .badge-over    { background: #fff0f0; color: var(--red); }

    /* ── Workers row ───────────────────────────── */
    .workers-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--gray-2);
    }
    .workers-label { font: 700 14px 'Manrope', sans-serif; color: var(--dark); }
    .workers-sub { font: 400 12px 'Manrope', sans-serif; color: var(--gray-4); display: block; margin-top: 2px; }
    .stepper-inline {
      display: flex; align-items: center;
      border: 1.5px solid var(--gray-2); border-radius: 8px; overflow: hidden;
    }
    .stepper-btn {
      width: 44px; height: 44px; border: none; background: var(--gray-1);
      font-size: 20px; font-weight: 700; color: var(--dark); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .stepper-btn:active { background: var(--gray-2); }
    .stepper-val {
      min-width: 42px; text-align: center;
      font: 800 17px 'Manrope', sans-serif; color: var(--dark);
      border-left: 1.5px solid var(--gray-2); border-right: 1.5px solid var(--gray-2);
      line-height: 44px;
    }

    /* ── SKU list ──────────────────────────────── */
    .section-label {
      font: 700 11px 'Manrope', sans-serif; color: var(--gray-3);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
    }
    .sku-row {
      padding: 10px 0; border-bottom: 1px solid var(--gray-2);
      display: flex; flex-direction: column; gap: 3px;
    }
    .sku-row:last-child { border-bottom: none; }
    .sku-name { font: 700 17px 'Manrope', sans-serif; color: var(--dark); }
    .sku-detail { font: 400 14px 'Manrope', sans-serif; color: var(--gray-4); }
    .sku-detail strong { color: var(--dark); font-weight: 800; }
    .sku-delivery { font: 400 12px 'Manrope', sans-serif; color: var(--gray-3); }
    .sku-customers { font: 400 12px 'Manrope', sans-serif; color: var(--gray-3); }
    .inv-badge {
      display: inline-block; font: 600 11px 'Manrope', sans-serif;
      color: var(--green); background: #e8f5e8;
      padding: 2px 7px; border-radius: 4px; margin-top: 1px;
    }

    /* ── Urgency tags ──────────────────────────── */
    .sku-tag {
      display: inline-block; font: 700 11px 'Manrope', sans-serif;
      padding: 2px 7px; border-radius: 4px; margin-top: 1px;
    }
    .sku-tag-urgent { background: #fff0f0; color: var(--red); }
    .sku-tag-ahead  { background: #fff3cd; color: #856404; }

    /* ── Group label (BFP coating) ─────────────── */
    .group-label {
      font: 700 11px 'Manrope', sans-serif; color: var(--red);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin: 14px 0 4px; padding-top: 8px; border-top: 1px dashed var(--gray-2);
    }

    /* ── Batch total ───────────────────────────── */
    .batch-total {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border-radius: 10px; margin: 12px 0;
    }
    .batch-total.ok   { background: #f0f8f0; }
    .batch-total.over { background: #fff0f0; }
    .batch-total.zero { background: var(--gray-1); }
    .batch-total-left { display: flex; flex-direction: column; gap: 2px; }
    .batch-total-num { font: 800 28px 'Manrope', sans-serif; color: var(--dark); line-height: 1; }
    .batch-total-lbl { font: 400 13px 'Manrope', sans-serif; color: var(--gray-4); }
    .batch-status { font: 700 14px 'Manrope', sans-serif; }
    .status-ok   { color: var(--green); }
    .status-over { color: var(--red); }
    .workers-cap { font: 400 12px 'Manrope', sans-serif; color: var(--gray-4); margin-top: 3px; }

    /* ── Inventory strip ───────────────────────── */
    .inv-strip {
      background: var(--gray-1); border-radius: 8px; padding: 10px 12px; margin: 10px 0;
    }
    .inv-strip-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px;
    }
    .inv-strip-items { font: 400 13px 'Manrope', sans-serif; color: var(--gray-4); }
    .inv-strip-empty { font: 400 13px 'Manrope', sans-serif; color: var(--gray-3); }
    .btn-link {
      background: none; border: none; color: var(--red);
      font: 600 13px 'Manrope', sans-serif; cursor: pointer; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Completed strip ───────────────────────── */
    .completed-strip {
      background: #e8f5e8; border-radius: 8px; padding: 10px 12px; margin: 10px 0;
    }
    .completed-strip-header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; margin-bottom: 6px; flex-wrap: wrap;
    }
    .completed-strip-lbl { font: 700 13px 'Manrope', sans-serif; color: var(--green); }
    .completed-pills { display: flex; flex-wrap: wrap; gap: 5px; }
    .completed-pill {
      font: 600 12px 'Manrope', sans-serif; color: var(--green);
      background: var(--white); border-radius: 6px; padding: 3px 9px;
    }
    .progress-short { font: 700 13px 'Manrope', sans-serif; color: var(--red); }
    .progress-done  { font: 700 13px 'Manrope', sans-serif; color: var(--green); }

    /* ── FOH note ──────────────────────────────── */
    .foh-note {
      font: 400 12px 'Manrope', sans-serif; color: var(--gray-3);
      margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--gray-2);
    }

    /* ── Log & extra buttons ───────────────────── */
    .log-btn {
      display: block; width: 100%; min-height: 54px;
      background: var(--red); color: var(--white); border: none;
      border-radius: 10px; font: 700 16px 'Manrope', sans-serif; cursor: pointer;
      margin-top: 14px; -webkit-tap-highlight-color: transparent;
    }
    .log-btn:active { background: var(--red-dk); }
    .log-btn.logged { background: var(--green); }
    .log-btn.logged:active { background: #1e5c1e; }
    .log-btn-extra {
      display: block; width: 100%; min-height: 44px;
      background: none; border: 1.5px solid var(--gray-2);
      border-radius: 10px; font: 600 14px 'Manrope', sans-serif;
      color: var(--dark); cursor: pointer; margin-top: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .log-btn-extra:active { background: var(--gray-1); }

    /* ── Week view ─────────────────────────────── */
    .week-section-lbl {
      font: 700 11px 'Manrope', sans-serif; color: var(--gray-3);
      text-transform: uppercase; letter-spacing: 0.5px;
      padding: 14px 4px 6px;
    }
    .week-row {
      background: var(--white); border-radius: 12px;
      padding: 14px 16px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 12px; min-height: 64px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .week-row:active { background: var(--gray-1); }
    .week-row.is-today { border-left: 4px solid var(--red); padding-left: 12px; }
    .week-row.is-empty { opacity: 0.45; }
    .week-row-date { flex: 1; }
    .week-row-day { font: 700 17px 'Manrope', sans-serif; color: var(--dark); }
    .week-row-sub { font: 400 12px 'Manrope', sans-serif; color: var(--gray-4); margin-top: 3px; }
    .week-row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
    .week-team-line { font: 600 12px 'Manrope', sans-serif; color: var(--gray-4); }
    .week-chevron { font: 400 20px 'Manrope', sans-serif; color: var(--gray-3); margin-top: 2px; }

    /* ── No production ─────────────────────────── */
    .no-prod {
      text-align: center; color: var(--gray-3);
      font: 400 15px 'Manrope', sans-serif; padding: 48px 20px;
    }

    /* ── Load error ────────────────────────────── */
    .load-error {
      background: #fff0f0; border-radius: 12px; padding: 24px 20px;
      text-align: center; font: 600 15px 'Manrope', sans-serif; color: var(--red);
    }

    /* ── Bottom sheet ──────────────────────────── */
    .sheet-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 200;
      align-items: flex-end; justify-content: center;
    }
    .sheet-overlay.open { display: flex; }
    .sheet {
      background: var(--white); border-radius: 18px 18px 0 0;
      width: 100%; max-width: 640px; max-height: 92vh; overflow-y: auto;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .sheet-handle {
      width: 40px; height: 4px; background: var(--gray-2);
      border-radius: 2px; margin: 12px auto 16px;
    }
    .sheet-header { padding: 0 20px 16px; border-bottom: 1px solid var(--gray-2); }
    .sheet-title { font-family: 'Paytone One', sans-serif; font-size: 20px; color: var(--dark); }
    .sheet-sub { font: 400 13px 'Manrope', sans-serif; color: var(--gray-4); margin-top: 3px; }
    .sheet-body { padding: 0 20px; }
    .sheet-footer { padding: 12px 20px 20px; border-top: 1px solid var(--gray-2); }

    /* ── Sheet workers row ─────────────────────── */
    .sheet-workers-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; border-bottom: 1px solid var(--gray-2);
    }
    .sheet-workers-lbl { font: 700 16px 'Manrope', sans-serif; color: var(--dark); }
    .sheet-workers-sub { font: 400 12px 'Manrope', sans-serif; color: var(--gray-4); display: block; margin-top: 2px; }

    /* ── Sheet steppers ────────────────────────── */
    .stepper-lg { display: flex; align-items: center; }
    .step-btn {
      width: 48px; height: 48px; border: 1.5px solid var(--gray-2); border-radius: 8px;
      background: var(--gray-1); font-size: 24px; font-weight: 700; color: var(--dark);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .step-btn:active { background: var(--gray-2); }
    .step-val {
      min-width: 56px; text-align: center;
      font: 800 22px 'Manrope', sans-serif; color: var(--dark);
    }

    /* ── Sheet SKU rows ────────────────────────── */
    .log-sku-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0; border-bottom: 1px solid var(--gray-2); gap: 12px;
    }
    .log-sku-row:last-child { border-bottom: none; }
    .log-sku-info { flex: 1; min-width: 0; }
    .log-sku-name { font: 700 16px 'Manrope', sans-serif; color: var(--dark); }
    .log-sku-demand { font: 400 13px 'Manrope', sans-serif; color: var(--gray-4); margin-top: 2px; }

    /* ── Extra sheet select ────────────────────── */
    .extra-sku-select {
      width: 100%; padding: 14px; margin-bottom: 20px;
      border: 1.5px solid var(--gray-2); border-radius: 10px;
      font: 600 16px 'Manrope', sans-serif; color: var(--dark);
      background: var(--white); appearance: none; -webkit-appearance: none;
    }

    /* ── Sheet inv input row ───────────────────── */
    .inv-input-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid var(--gray-2); gap: 10px;
    }
    .inv-input-row:last-child { border-bottom: none; }
    .inv-input-lbl { font: 700 15px 'Manrope', sans-serif; color: var(--dark); flex: 1; }
    .inv-input {
      width: 80px; padding: 10px; text-align: center;
      font: 700 17px 'Manrope', sans-serif !important;
      border: 1.5px solid var(--gray-2); border-radius: 8px;
    }
    .inv-input-unit { font: 400 12px 'Manrope', sans-serif; color: var(--gray-4); white-space: nowrap; }

    /* ── Sheet buttons ─────────────────────────── */
    .btn-primary {
      display: block; width: 100%; min-height: 54px;
      background: var(--red); color: var(--white); border: none;
      border-radius: 10px; font: 700 16px 'Manrope', sans-serif; cursor: pointer;
    }
    .btn-primary:active { background: var(--red-dk); }
    .btn-primary:disabled { opacity: 0.5; }
    .btn-secondary {
      display: block; width: 100%; min-height: 48px;
      background: var(--gray-1); color: var(--dark); border: 1.5px solid var(--gray-2);
      border-radius: 10px; font: 600 15px 'Manrope', sans-serif; cursor: pointer;
      margin-top: 8px;
    }

    @media (min-width: 640px) {
      .team-name { font-size: 21px; }
      .sku-name  { font-size: 18px; }
      .batch-total-num { font-size: 32px; }
    }
  </style>
</head>
<body>

<nav class="topnav">
  <button class="nav-arrow" id="nav-prev" aria-label="Previous day">‹</button>
  <div class="date-display" id="date-display" role="button" tabindex="0" aria-label="Go to today">
    <span class="date-label" id="date-label">Today</span>
    <span class="date-sub" id="date-sub"></span>
  </div>
  <button class="nav-arrow" id="nav-next" aria-label="Next day">›</button>
  <button class="week-toggle" id="week-toggle">Week</button>
</nav>

<div class="content">
  <div id="alert-area"></div>
  <div id="main-view"><div class="no-prod">Loading…</div></div>
</div>

<!-- Log completions sheet -->
<div class="sheet-overlay" id="log-overlay" role="dialog" aria-modal="true">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="log-title">Log Completions</div>
      <div class="sheet-sub" id="log-sub"></div>
    </div>
    <div class="sheet-body" id="log-body"></div>
    <div class="sheet-footer">
      <button class="btn-primary" id="log-save">Save Completions</button>
      <button class="btn-secondary" id="log-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- Extra / unscheduled batch sheet -->
<div class="sheet-overlay" id="extra-overlay" role="dialog" aria-modal="true">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="extra-title">Add Unscheduled Batch</div>
      <div class="sheet-sub" id="extra-sub">Last-minute order or walk-in</div>
    </div>
    <div class="sheet-body" style="padding:20px">
      <select class="extra-sku-select" id="extra-sku-select"></select>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0">
        <span style="font:700 16px 'Manrope',sans-serif;color:var(--dark)">Batches</span>
        <div class="stepper-lg">
          <button class="step-btn" id="extra-dec">−</button>
          <span class="step-val" id="extra-val">1</span>
          <button class="step-btn" id="extra-inc">+</button>
        </div>
      </div>
    </div>
    <div class="sheet-footer">
      <button class="btn-primary" id="extra-save">Save Batch</button>
      <button class="btn-secondary" id="extra-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- Inventory sheet -->
<div class="sheet-overlay" id="inv-overlay" role="dialog" aria-modal="true">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="inv-title">On-Hand Inventory</div>
      <div class="sheet-sub" id="inv-sub"></div>
    </div>
    <div class="sheet-body" id="inv-body"></div>
    <div class="sheet-footer">
      <button class="btn-primary" id="inv-save">Save Inventory</button>
      <button class="btn-secondary" id="inv-cancel">Cancel</button>
    </div>
  </div>
</div>

<script type="module">
  import { fetchLog, appendLog } from '../../scripts/sheet-logger.js';

  // ─── CONFIG ───────────────────────────────────────────────────────────────

  const DELIVERY_LOG   = '/dangpretz/delivery-planner';
  const PRODUCTION_LOG = '/dangpretz/production';

  const BATCH_SIZES = {
    '21oz mammoth pretzel': 24,
    '10oz mustache':        48,
    '10oz plain':           48,
    '10oz bbk':             48,
    '10oz spicy bee':       48,
    '6.5oz plain':          72,
    '6.5oz bbk':            72,
    '6.5oz spicy bee':      72,
    'plain bombs':          72,
    'bees bats':            72,
  };

  // Units per case — ⚠️ SET TO 0 UNTIL CONFIRMED
  const CASE_SIZES = {
    '21oz mammoth pretzel': 0,  // ← update
    '10oz mustache':        0,  // ← update
    '10oz plain':           0,  // ← update
    '10oz bbk':             0,  // ← update
    '10oz spicy bee':       0,  // ← update
    '6.5oz plain':          0,  // ← update
    '6.5oz bbk':            0,  // ← update
    '6.5oz spicy bee':      0,  // ← update
    'plain bombs':          0,  // ← update
    'bees bats':            0,  // ← update
  };

  const FOH_SKUS = new Set([
    '3oz cheese dip',
    'bulk dangerous dip (25 srv)',
  ]);

  const BAKE_GROUPS = {
    coating: ['10oz bbk', '10oz spicy bee', '6.5oz bbk', '6.5oz spicy bee'],
  };

  const BATCHES_PER_WORKER  = 6;   // soft cap per worker per shift
  const SHAPE_MIN_LEAD      = 2;   // shape must happen at least N days before delivery
  const SHAPE_MAX_LEAD      = 7;   // shape can happen up to N days before delivery
  const BFP_MIN_LEAD        = 1;   // BFP must happen at least N days before delivery
  const BFP_MAX_LEAD        = 3;   // BFP can happen up to N days before delivery
  const SCHEDULE_LOOKAHEAD  = 14;  // days of deliveries to scan

  // ─── STATE ────────────────────────────────────────────────────────────────

  let allDeliveries   = [];
  let productionState = {};
  let schedule        = { shape: {}, bfp: {}, overdue: [], foh: [] };
  let currentDate     = new Date();
  let viewMode        = 'day';

  let logType = null, logDate = null, logItems = [], logWorkers = 1;
  let invDate = null, invType = null;
  let extraType = null, extraDate = null, extraValue = 1;

  // ─── DATE HELPERS ─────────────────────────────────────────────────────────

  const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  const toDateStr   = d => d.toISOString().slice(0, 10);
  const parseDate   = s => { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); };
  const addDays     = (d, n) => { const r = new Date(d); r.setDate(r.getDate() + n); return r; };
  const daysBetween = (a, b) => Math.round((parseDate(b) - parseDate(a)) / 86400000);
  const fmtShort    = d => `${MONTHS[d.getMonth()]} ${d.getDate()}`;
  const fmtFull     = d => `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}`;
  const fmtDay      = d => DAYS[d.getDay()];
  const esc         = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // ─── RESOLVE DELIVERIES ───────────────────────────────────────────────────

  function resolveDeliveries(logs) {
    const byId = {};
    if (!Array.isArray(logs)) return [];
    logs.forEach((row, idx) => {
      const id = row.deliveryId || `legacy-${idx}`;
      if (row.action === 'delete') { delete byId[id]; return; }
      if (row.action === 'barcodes') return;
      if (row.action === 'confirm') {
        if (byId[id]) {
          byId[id].status = (byId[id].type || 'delivery').toLowerCase() === 'pickup'
            ? 'picked_up' : 'delivered';
        }
        return;
      }
      if (row.action === 'status') { if (byId[id]) byId[id].status = row.status || 'scheduled'; return; }
      if (row.action === 'update') {
        const prev = byId[id];
        byId[id] = { ...row, deliveryId: id, status: row.status || 'scheduled' };
        if (prev?.barcodes) byId[id].barcodes = prev.barcodes;
        return;
      }
      byId[id] = { ...row, deliveryId: id, status: row.status || 'scheduled' };
    });
    return Object.values(byId);
  }

  // ─── RESOLVE PRODUCTION LOGS ──────────────────────────────────────────────
  // Accumulation fix: merges all entries per date instead of last-write-wins.

  function resolveProductionLogs(logs) {
    const state = {};
    if (!Array.isArray(logs)) return state;
    logs.forEach(row => {
      const { date, action } = row;
      if (!date || !action) return;
      if (!state[date]) state[date] = {};
      const s = state[date];

      if (action === 'inventory') {
        try {
          const snaps = JSON.parse(row.snapshots || '[]');
          const cf = {}, fr = {};
          snaps.forEach(sn => {
            if (sn.coldFerment > 0) cf[sn.sku] = Number(sn.coldFerment);
            if (sn.frozen > 0)      fr[sn.sku] = Number(sn.frozen);
          });
          s.coldFerment = cf; s.frozen = fr;
        } catch {}
        return;
      }
      if (action === 'shape_done') {
        try {
          const incoming = JSON.parse(row.completions || '[]');
          const merged = {};
          (s.shapeDone || []).forEach(c => { merged[c.sku] = (merged[c.sku] || 0) + (Number(c.batches) || 0); });
          incoming.forEach(c => { merged[c.sku] = (merged[c.sku] || 0) + (Number(c.batches) || 0); });
          s.shapeDone    = Object.entries(merged).map(([sku, batches]) => ({ sku, batches }));
          s.shapeWorkers = Number(row.workers) || 1;
          s.shapeTime    = row.timeStamp;
        } catch {}
        return;
      }
      if (action === 'bfp_done') {
        try {
          const incoming = JSON.parse(row.completions || '[]');
          const merged = {};
          (s.bfpDone || []).forEach(c => { merged[c.sku] = (merged[c.sku] || 0) + (Number(c.batches) || 0); });
          incoming.forEach(c => { merged[c.sku] = (merged[c.sku] || 0) + (Number(c.batches) || 0); });
          s.bfpDone    = Object.entries(merged).map(([sku, batches]) => ({ sku, batches }));
          s.bfpWorkers = Number(row.workers) || 1;
          s.bfpTime    = row.timeStamp;
        } catch {}
        return;
      }
    });
    return state;
  }

  // ─── WORKER PERSISTENCE ───────────────────────────────────────────────────

  const getWorkers  = (type, date) => Math.max(1, parseInt(localStorage.getItem(`prod-${type}-workers-${date}`), 10) || 1);
  const saveWorkers = (type, date, n) => localStorage.setItem(`prod-${type}-workers-${date}`, String(Math.max(1, n)));

  // ─── BUILD OPTIMAL SCHEDULE ───────────────────────────────────────────────
  // Greedy rolling-window scheduler. Runs on every data load.
  //
  // Priority sort per day:
  //   1. daysLeft = 0 (must do today — last day in window)
  //   2. daysLeft ASC (most urgent next)
  //   3. totalSkuRunSize DESC (consolidate large runs)
  //   4. deliveryDate ASC (earlier delivery breaks ties)

  function buildOptimalSchedule() {
    const today    = new Date();
    const todayStr = toDateStr(today);

    // Step 1: Collect all pending demand across the lookahead window
    // bySkuItems: sku -> [{deliveryDate, batches, pretzels, shapeWindow, bfpWindow, orders, shapeLeft, bfpLeft}]
    const bySkuItems = {};
    const fohSeen   = new Set();

    for (let i = 0; i <= SCHEDULE_LOOKAHEAD; i++) {
      const delivDate = toDateStr(addDays(today, i));
      const dd        = parseDate(delivDate);
      const skuMap    = {};

      allDeliveries
        .filter(d => d.date === delivDate && !['delivered','picked_up','cancelled'].includes(d.status))
        .forEach(delivery => {
          let items = [];
          try { items = JSON.parse(delivery.lineItems || '[]'); } catch {}
          items.forEach(({ sku, quantity }) => {
            if (!sku) return;
            const key  = sku.trim();
            const norm = key.toLowerCase();
            if (FOH_SKUS.has(norm) || FOH_SKUS.has(key)) { fohSeen.add(key); return; }
            if (!skuMap[key]) skuMap[key] = { pretzels: 0, orders: [] };
            skuMap[key].pretzels += Number(quantity) || 0;
            const cust = delivery.customer || delivery.location || '?';
            if (!skuMap[key].orders.includes(cust)) skuMap[key].orders.push(cust);
          });
        });

      Object.entries(skuMap).forEach(([sku, data]) => {
        const batchSize = BATCH_SIZES[sku];
        if (!batchSize) return; // skip unconfigured SKUs from scheduling
        const batches = Math.ceil(data.pretzels / batchSize);
        if (!bySkuItems[sku]) bySkuItems[sku] = [];
        bySkuItems[sku].push({
          sku, batches, pretzels: data.pretzels, deliveryDate: delivDate,
          orders: data.orders,
          shapeWindow: { start: toDateStr(addDays(dd, -SHAPE_MAX_LEAD)), end: toDateStr(addDays(dd, -SHAPE_MIN_LEAD)) },
          bfpWindow:   { start: toDateStr(addDays(dd, -BFP_MAX_LEAD)),   end: toDateStr(addDays(dd, -BFP_MIN_LEAD))   },
          shapeLeft: batches,
          bfpLeft:   batches,
        });
      });
    }

    // Sort each SKU's items by delivery date (FIFO for completion attribution)
    Object.values(bySkuItems).forEach(arr => arr.sort((a,b) => a.deliveryDate.localeCompare(b.deliveryDate)));

    // Step 2: Subtract completed work (FIFO — earliest delivery cleared first)
    const doneSku = { shape: {}, bfp: {} };
    Object.values(productionState).forEach(state => {
      (state.shapeDone || []).forEach(c => {
        doneSku.shape[c.sku] = (doneSku.shape[c.sku] || 0) + (Number(c.batches) || 0);
      });
      (state.bfpDone || []).forEach(c => {
        doneSku.bfp[c.sku] = (doneSku.bfp[c.sku] || 0) + (Number(c.batches) || 0);
      });
    });

    Object.entries(doneSku.shape).forEach(([sku, total]) => {
      if (!bySkuItems[sku]) return;
      let left = total;
      for (const item of bySkuItems[sku]) {
        const take = Math.min(item.shapeLeft, left);
        item.shapeLeft -= take; left -= take;
        if (left <= 0) break;
      }
    });
    Object.entries(doneSku.bfp).forEach(([sku, total]) => {
      if (!bySkuItems[sku]) return;
      let left = total;
      for (const item of bySkuItems[sku]) {
        const take = Math.min(item.bfpLeft, left);
        item.bfpLeft -= take; left -= take;
        if (left <= 0) break;
      }
    });

    // Separate overdue items (window already closed, work not done)
    const overdue = [];
    const shapePool = [], bfpPool = [];
    Object.values(bySkuItems).flat().forEach(item => {
      if (item.shapeLeft > 0) {
        if (item.shapeWindow.end < todayStr) {
          overdue.push({ team: 'shape', sku: item.sku, batches: item.shapeLeft, windowEnd: item.shapeWindow.end, deliveryDate: item.deliveryDate });
        } else {
          shapePool.push({ sku: item.sku, left: item.shapeLeft, deliveryDate: item.deliveryDate, window: item.shapeWindow, orders: item.orders, pretzels: item.pretzels });
        }
      }
      if (item.bfpLeft > 0) {
        if (item.bfpWindow.end < todayStr) {
          overdue.push({ team: 'bfp', sku: item.sku, batches: item.bfpLeft, windowEnd: item.bfpWindow.end, deliveryDate: item.deliveryDate });
        } else {
          bfpPool.push({ sku: item.sku, left: item.bfpLeft, deliveryDate: item.deliveryDate, window: item.bfpWindow, orders: item.orders, pretzels: item.pretzels });
        }
      }
    });

    // Step 3: Greedy schedule each pool
    function schedulePool(pool, type) {
      const sched   = {};
      const lookahead = type === 'shape'
        ? SCHEDULE_LOOKAHEAD + SHAPE_MAX_LEAD
        : SCHEDULE_LOOKAHEAD + BFP_MAX_LEAD;

      for (let i = 0; i < lookahead; i++) {
        const dayStr  = toDateStr(addDays(today, i));
        const workers  = getWorkers(type, dayStr);
        const capacity = workers * BATCHES_PER_WORKER;

        // Eligible items: window includes today and still have work left
        const eligible = pool.filter(p =>
          p.left > 0 && dayStr >= p.window.start && dayStr <= p.window.end
        );
        if (eligible.length === 0) continue;

        // Compute current run sizes per SKU across remaining pool
        const runSizes = {};
        pool.forEach(p => { if (p.left > 0) runSizes[p.sku] = (runSizes[p.sku] || 0) + p.left; });

        // Annotate and sort
        const annotated = eligible
          .map(p => ({ ...p, daysLeft: daysBetween(dayStr, p.window.end), runSize: runSizes[p.sku] || 0 }))
          .sort((a, b) => {
            if (a.daysLeft !== b.daysLeft) return a.daysLeft - b.daysLeft;  // urgent first
            if (b.runSize  !== a.runSize)  return b.runSize  - a.runSize;   // large run first (consolidate)
            return a.deliveryDate.localeCompare(b.deliveryDate);             // earliest delivery tiebreak
          });

        // Always fit must-do items even if over capacity
        const mustDoTotal = annotated.filter(a => a.daysLeft === 0).reduce((s, a) => s + a.left, 0);
        const effectiveCap = Math.max(capacity, mustDoTotal);
        const isOverloaded = mustDoTotal > capacity;

        let cap = effectiveCap;
        const dayItems = [];

        for (const a of annotated) {
          if (cap <= 0) break;
          const take = Math.min(a.left, cap);

          // Mutate pool item
          const poolItem = pool.find(p => p.sku === a.sku && p.deliveryDate === a.deliveryDate);
          if (poolItem) poolItem.left -= take;

          // Merge same-SKU into day's item list
          const existing = dayItems.find(d => d.sku === a.sku);
          if (existing) {
            existing.batches += take;
            if (!existing.deliveryDates.includes(a.deliveryDate)) existing.deliveryDates.push(a.deliveryDate);
            existing.urgent = existing.urgent || a.daysLeft === 0;
            a.orders.forEach(o => { if (!existing.orders.includes(o)) existing.orders.push(o); });
          } else {
            dayItems.push({
              sku: a.sku, batches: take,
              deliveryDates: [a.deliveryDate],
              urgent: a.daysLeft === 0,
              overloaded: isOverloaded,
              orders: [...a.orders],
            });
          }
          cap -= take;
        }

        if (dayItems.length > 0) sched[dayStr] = dayItems;
      }
      return sched;
    }

    return {
      shape:  schedulePool(shapePool, 'shape'),
      bfp:    schedulePool(bfpPool,   'bfp'),
      overdue,
      foh: [...fohSeen],
    };
  }

  // ─── TEAM STATUS ──────────────────────────────────────────────────────────

  function getTeamStatus(type, dateStr) {
    const items  = schedule[type][dateStr] || [];
    const needed = items.reduce((s, d) => s + d.batches, 0);
    if (needed === 0) return 'none';
    const doneKey = type === 'shape' ? 'shapeDone' : 'bfpDone';
    const done    = ((productionState[dateStr] || {})[doneKey] || [])
      .reduce((s, c) => s + (Number(c.batches) || 0), 0);
    if (done === 0) return 'todo';
    if (done >= needed) return 'done';
    return 'partial';
  }

  // ─── RENDER TEAM CARD ─────────────────────────────────────────────────────

  function renderTeamCard(type, dateStr) {
    const isBFP    = type === 'bfp';
    const title    = isBFP ? 'Bake · Freeze · Pack' : 'Shape & Cold Ferment';
    const items    = schedule[type][dateStr] || [];
    const dayState = productionState[dateStr] || {};
    const workers  = getWorkers(type, dateStr);
    const capacity = workers * BATCHES_PER_WORKER;
    const needed   = items.reduce((s, d) => s + d.batches, 0);
    const isOver   = needed > capacity;
    const spare    = capacity - needed;

    const doneKey   = isBFP ? 'bfpDone'   : 'shapeDone';
    const timeKey   = isBFP ? 'bfpTime'   : 'shapeTime';
    const invKey    = isBFP ? 'frozen'     : 'coldFerment';
    const completed = dayState[doneKey] || [];
    const doneTotal = completed.reduce((s, c) => s + (Number(c.batches) || 0), 0);
    const inventory = dayState[invKey] || {};

    // Status badge
    let badgeClass, badgeText;
    if (needed === 0) {
      badgeClass = 'badge-none'; badgeText = 'No orders';
    } else if (doneTotal === 0) {
      badgeClass = 'badge-none'; badgeText = 'Not started';
    } else if (doneTotal > needed) {
      badgeClass = 'badge-over'; badgeText = `✅ Done +${doneTotal - needed}`;
    } else if (doneTotal >= needed) {
      badgeClass = 'badge-done'; badgeText = '✅ Done';
    } else {
      badgeClass = 'badge-partial'; badgeText = `⏳ ${doneTotal}/${needed}`;
    }

    // Delivery dates context for header
    const allDelivDates = [...new Set(items.flatMap(d => d.deliveryDates))].sort();
    const delivContext = allDelivDates.length === 0 ? ''
      : allDelivDates.map(ds => fmtShort(parseDate(ds))).join(' + ') + ' deliver' + (allDelivDates.length > 1 ? 'ies' : 'y');

    // Workers stepper
    const workersHtml = `
      <div class="workers-row">
        <div>
          <span class="workers-label">Workers</span>
          <span class="workers-sub">${capacity} batch capacity</span>
        </div>
        <div class="stepper-inline">
          <button class="stepper-btn" data-worker-dec data-type="${esc(type)}" data-date="${esc(dateStr)}">−</button>
          <span class="stepper-val" id="wv-${esc(type)}-${esc(dateStr)}">${workers}</span>
          <button class="stepper-btn" data-worker-inc data-type="${esc(type)}" data-date="${esc(dateStr)}">+</button>
        </div>
      </div>`;

    // SKU rows — render function handles BFP coating split
    const renderRows = rows => rows.map(d => {
      const inv     = inventory[d.sku] || 0;
      const caseSize = CASE_SIZES[d.sku];
      const caseStr  = caseSize ? ` · ${Math.ceil(d.batches * (BATCH_SIZES[d.sku]||0) / caseSize)} cases` : '';
      const urgTag   = d.urgent
        ? `<span class="sku-tag sku-tag-urgent">🔴 Must do today</span>`
        : `<span class="sku-tag sku-tag-ahead">🟡 Pulling ahead</span>`;
      const delivStr = d.deliveryDates.map(ds => `${fmtDay(parseDate(ds))} ${fmtShort(parseDate(ds))}`).join(' + ');
      return `<div class="sku-row">
        <span class="sku-name">${esc(d.sku)}</span>
        ${urgTag}
        <span class="sku-detail"><strong>${d.batches} batch${d.batches !== 1 ? 'es' : ''}</strong> — ${d.batches * (BATCH_SIZES[d.sku]||0)} units${esc(caseStr)}</span>
        <span class="sku-delivery">For ${esc(delivStr)} delivery</span>
        ${inv > 0 ? `<span class="inv-badge">✓ ${inv} on hand</span>` : ''}
        <span class="sku-customers">${d.orders.map(esc).join(' · ')}</span>
      </div>`;
    }).join('');

    let skuHtml = '';
    if (items.length === 0) {
      skuHtml = `<div style="font:400 14px 'Manrope',sans-serif;color:var(--gray-3);padding:6px 0 12px">Nothing scheduled — all orders covered or no upcoming deliveries in range.</div>`;
    } else if (isBFP) {
      const coating  = items.filter(d => BAKE_GROUPS.coating.includes(d.sku));
      const standard = items.filter(d => !BAKE_GROUPS.coating.includes(d.sku));
      if (standard.length > 0) { skuHtml += coating.length > 0 ? `<div class="group-label">Standard</div>` : ''; skuHtml += renderRows(standard); }
      if (coating.length > 0)  { skuHtml += `<div class="group-label">+ Coating step</div>${renderRows(coating)}`; }
    } else {
      skuHtml = renderRows(items);
    }

    // Batch total
    const batchTotalHtml = needed > 0 ? `
      <div class="batch-total ${isOver ? 'over' : 'ok'}">
        <div class="batch-total-left">
          <span class="batch-total-num">${needed}</span>
          <span class="batch-total-lbl">batch${needed !== 1 ? 'es' : ''} today</span>
        </div>
        <div style="text-align:right">
          <span class="batch-status ${isOver ? 'status-over' : 'status-ok'}">
            ${isOver ? `🔴 +${needed - capacity} over` : `✅ ${spare} spare`}
          </span>
          <div class="workers-cap">${workers} worker${workers !== 1 ? 's' : ''} · ${capacity} cap</div>
        </div>
      </div>` : '';

    // Inventory strip
    const invItems = Object.entries(inventory).filter(([,v]) => v > 0)
      .map(([sku, n]) => `${esc(sku)}: ${n}`).join(' · ');
    const invHtml = `
      <div class="inv-strip">
        <div class="inv-strip-header">
          <span class="section-label" style="margin:0">${isBFP ? 'Frozen on hand' : 'Cold ferment on hand'}</span>
          <button class="btn-link" data-inv-btn data-date="${esc(dateStr)}" data-inv-type="${esc(type)}">Update</button>
        </div>
        ${invItems ? `<span class="inv-strip-items">${invItems}</span>` : `<span class="inv-strip-empty">None entered</span>`}
      </div>`;

    // Completed strip
    let completedHtml = '';
    if (doneTotal > 0) {
      const timeStr = dayState[timeKey]
        ? new Date(dayState[timeKey]).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        : '';
      const delta = doneTotal - needed;
      const progressHtml = needed > 0
        ? (delta >= 0
          ? `<span class="progress-done">✅ Done${delta > 0 ? ` (+${delta})` : '!'}</span>`
          : `<span class="progress-short">⚠️ ${Math.abs(delta)} short</span>`)
        : '';
      const pills = completed.map(c => `<span class="completed-pill">${esc(c.sku)} ×${c.batches}</span>`).join('');
      completedHtml = `
        <div class="completed-strip">
          <div class="completed-strip-header">
            <span class="completed-strip-lbl">Logged${timeStr ? ` at ${timeStr}` : ''} — ${doneTotal} batch${doneTotal !== 1 ? 'es' : ''}</span>
            ${progressHtml}
          </div>
          <div class="completed-pills">${pills}</div>
        </div>`;
    }

    // FOH note (shape card only, once)
    const fohHtml = (!isBFP && schedule.foh.length > 0)
      ? `<div class="foh-note">FOH only (not scheduled): ${schedule.foh.map(esc).join(', ')}</div>` : '';

    // Buttons
    const logBtnClass = (doneTotal >= needed && needed > 0) ? 'log-btn logged' : 'log-btn';
    const logBtnText  = (doneTotal >= needed && needed > 0) ? '✅ Log More' : 'Log Completions';
    const logBtnHtml  = `<button class="${logBtnClass}" data-log-btn data-type="${esc(type)}" data-date="${esc(dateStr)}">${logBtnText}</button>
      <button class="log-btn-extra" data-extra-btn data-type="${esc(type)}" data-date="${esc(dateStr)}">+ Add Unscheduled Batch</button>`;

    return `<div class="team-card">
      <div class="team-header">
        <div>
          <div class="team-name">${esc(title)}</div>
          ${delivContext ? `<div class="team-date">${esc(delivContext)}</div>` : ''}
        </div>
        <span class="status-badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="team-body">
        ${workersHtml}
        ${skuHtml}
        ${batchTotalHtml}
        ${invHtml}
        ${completedHtml}
        ${fohHtml}
        ${logBtnHtml}
      </div>
    </div>`;
  }

  // ─── RENDER DAY VIEW ──────────────────────────────────────────────────────

  function renderDayView() {
    const dateStr   = toDateStr(currentDate);
    const shapeItems = schedule.shape[dateStr] || [];
    const bfpItems   = schedule.bfp[dateStr]   || [];

    if (shapeItems.length === 0 && bfpItems.length === 0) {
      return `<div class="no-prod">Nothing scheduled today.<br>
        <span style="font-size:13px;color:var(--gray-3)">All upcoming orders covered, or no deliveries within production windows.</span>
      </div>`;
    }
    return renderTeamCard('shape', dateStr) + renderTeamCard('bfp', dateStr);
  }

  // ─── RENDER WEEK VIEW ─────────────────────────────────────────────────────

  function renderWeekView() {
    const today    = new Date();
    const todayStr = toDateStr(today);
    const statusIcon = s => s === 'done' ? '✅' : s === 'partial' ? '⏳' : s === 'todo' ? '⬜' : '—';
    let html = '';

    for (let i = 0; i < SCHEDULE_LOOKAHEAD; i++) {
      const d  = addDays(today, i);
      const ds = toDateStr(d);

      const sItems   = schedule.shape[ds] || [];
      const bItems   = schedule.bfp[ds]   || [];
      const sTotal   = sItems.reduce((s, x) => s + x.batches, 0);
      const bTotal   = bItems.reduce((s, x) => s + x.batches, 0);
      const isEmpty  = sTotal === 0 && bTotal === 0;
      const sStatus  = getTeamStatus('shape', ds);
      const bStatus  = getTeamStatus('bfp', ds);

      if (i === 0) html += `<div class="week-section-lbl">This week</div>`;
      else if (i === 7) html += `<div class="week-section-lbl">Next week</div>`;

      const dayLabel  = i === 0 ? 'Today' : i === 1 ? 'Tomorrow' : DAYS[d.getDay()];
      const shapeText = sTotal > 0 ? `${statusIcon(sStatus)} Shape: ${sTotal}` : `${statusIcon(sStatus)} Shape`;
      const bfpText   = bTotal > 0 ? `${statusIcon(bStatus)} BFP: ${bTotal}` : `${statusIcon(bStatus)} BFP`;

      html += `<div class="week-row${ds === todayStr ? ' is-today' : ''}${isEmpty ? ' is-empty' : ''}"
        data-goto="${esc(ds)}" role="button" tabindex="0">
        <div class="week-row-date">
          <div class="week-row-day">${esc(dayLabel)}</div>
          <div class="week-row-sub">${esc(fmtShort(d))}${isEmpty ? ' — no production' : ''}</div>
        </div>
        <div class="week-row-right">
          <span class="week-team-line">${shapeText}</span>
          <span class="week-team-line">${bfpText}</span>
          <span class="week-chevron">›</span>
        </div>
      </div>`;
    }
    return html || `<div class="no-prod">No production scheduled in the next ${SCHEDULE_LOOKAHEAD} days.</div>`;
  }

  // ─── UPDATE NAV BAR ───────────────────────────────────────────────────────

  function updateNav() {
    const todayStr = toDateStr(new Date());
    const curStr   = toDateStr(currentDate);
    const label    = document.getElementById('date-label');
    const sub      = document.getElementById('date-sub');
    const wt       = document.getElementById('week-toggle');

    if (viewMode === 'week') {
      label.textContent = 'Week View';
      label.classList.remove('is-today');
      sub.textContent = `Next ${SCHEDULE_LOOKAHEAD} days`;
      wt.classList.add('active');
    } else {
      const diff = Math.round((parseDate(curStr) - parseDate(todayStr)) / 86400000);
      if (diff === 0)       { label.textContent = 'Today';     label.classList.add('is-today'); }
      else if (diff === 1)  { label.textContent = 'Tomorrow';  label.classList.remove('is-today'); }
      else if (diff === -1) { label.textContent = 'Yesterday'; label.classList.remove('is-today'); }
      else                  { label.textContent = fmtFull(currentDate); label.classList.remove('is-today'); }
      sub.textContent = diff === 0 ? fmtFull(currentDate)
        : diff > 0 ? `${diff} days away` : `${-diff} days ago`;
      wt.classList.remove('active');
    }
  }

  // ─── MAIN RENDER ──────────────────────────────────────────────────────────

  function render() {
    updateNav();

    // Overdue banner
    const overdueHtml = schedule.overdue.map(o =>
      `<div class="overdue-banner">🚨 Overdue (${o.team === 'shape' ? 'Shape' : 'BFP'}): ${esc(o.sku)} ×${o.batches} — window closed ${esc(o.windowEnd)}, needed for ${esc(o.deliveryDate)} delivery</div>`
    ).join('');

    // Unconfirmed deliveries today
    const todayStr = toDateStr(new Date());
    const unconfirmed = allDeliveries.filter(d =>
      d.date === todayStr && !['delivered','picked_up','cancelled'].includes(d.status)
    );
    const unconfirmedHtml = unconfirmed.length > 0
      ? `<div class="alert-banner">📦 ${unconfirmed.length} delivery${unconfirmed.length !== 1 ? 'ies' : 'y'} today not yet confirmed — <a href="../delivery-planner/index.html">Go to planner →</a></div>`
      : '';

    document.getElementById('alert-area').innerHTML = overdueHtml + unconfirmedHtml;
    document.getElementById('main-view').innerHTML  =
      viewMode === 'week' ? renderWeekView() : renderDayView();

    bindActions();
  }

  // ─── BIND ACTIONS ─────────────────────────────────────────────────────────

  function bindActions() {
    document.querySelectorAll('[data-worker-dec]').forEach(btn => {
      btn.addEventListener('click', () => {
        const { type, date } = btn.dataset;
        const cur = getWorkers(type, date);
        if (cur <= 1) return;
        saveWorkers(type, date, cur - 1);
        schedule = buildOptimalSchedule();
        render();
      });
    });
    document.querySelectorAll('[data-worker-inc]').forEach(btn => {
      btn.addEventListener('click', () => {
        const { type, date } = btn.dataset;
        saveWorkers(type, date, getWorkers(type, date) + 1);
        schedule = buildOptimalSchedule();
        render();
      });
    });
    document.querySelectorAll('[data-log-btn]').forEach(btn => {
      btn.addEventListener('click', () => openLogSheet(btn.dataset.type, btn.dataset.date));
    });
    document.querySelectorAll('[data-extra-btn]').forEach(btn => {
      btn.addEventListener('click', () => openExtraSheet(btn.dataset.type, btn.dataset.date));
    });
    document.querySelectorAll('[data-inv-btn]').forEach(btn => {
      btn.addEventListener('click', () => openInvSheet(btn.dataset.date, btn.dataset.invType));
    });
    document.querySelectorAll('[data-goto]').forEach(row => {
      row.addEventListener('click', () => {
        currentDate = parseDate(row.dataset.goto);
        viewMode = 'day';
        render();
      });
    });
  }

  // ─── LOG COMPLETIONS SHEET ────────────────────────────────────────────────

  function openLogSheet(type, dateStr) {
    logType    = type;
    logDate    = dateStr;
    logWorkers = getWorkers(type, dateStr);

    const items    = schedule[type][dateStr] || [];
    const dayState = productionState[dateStr] || {};
    const doneKey  = type === 'shape' ? 'shapeDone' : 'bfpDone';
    const prevDone = dayState[doneKey] || [];

    // Pre-fill with scheduled amounts so workers confirm (or adjust) what they made
    logItems = items.map(d => ({ sku: d.sku, demand: d.batches, value: d.batches }));

    document.getElementById('log-title').textContent =
      type === 'shape' ? 'Shape & Cold Ferment' : 'Bake · Freeze · Pack';
    document.getElementById('log-sub').textContent =
      `${dateStr}${prevDone.length > 0 ? ' · Adding to previous log' : ''}`;

    renderLogBody();
    document.getElementById('log-overlay').classList.add('open');
  }

  function renderLogBody() {
    const capacity = logWorkers * BATCHES_PER_WORKER;
    let html = `
      <div class="sheet-workers-row">
        <div>
          <span class="sheet-workers-lbl">Workers</span>
          <span class="sheet-workers-sub" id="log-cap-lbl">${capacity} batch capacity</span>
        </div>
        <div class="stepper-lg">
          <button class="step-btn" id="log-w-dec">−</button>
          <span class="step-val" id="log-w-val">${logWorkers}</span>
          <button class="step-btn" id="log-w-inc">+</button>
        </div>
      </div>`;

    html += logItems.map((item, i) => `
      <div class="log-sku-row">
        <div class="log-sku-info">
          <div class="log-sku-name">${esc(item.sku)}</div>
          <div class="log-sku-demand">Scheduled: ${item.demand} batch${item.demand !== 1 ? 'es' : ''}</div>
        </div>
        <div class="stepper-lg">
          <button class="step-btn" data-ldec="${i}">−</button>
          <span class="step-val" id="lv-${i}">${item.value}</span>
          <button class="step-btn" data-linc="${i}">+</button>
        </div>
      </div>`).join('');

    document.getElementById('log-body').innerHTML = html;

    document.getElementById('log-w-dec').addEventListener('click', () => {
      if (logWorkers <= 1) return;
      logWorkers--;
      document.getElementById('log-w-val').textContent = logWorkers;
      document.getElementById('log-cap-lbl').textContent = `${logWorkers * BATCHES_PER_WORKER} batch capacity`;
    });
    document.getElementById('log-w-inc').addEventListener('click', () => {
      logWorkers++;
      document.getElementById('log-w-val').textContent = logWorkers;
      document.getElementById('log-cap-lbl').textContent = `${logWorkers * BATCHES_PER_WORKER} batch capacity`;
    });
    document.querySelectorAll('[data-ldec]').forEach(btn => {
      const i = parseInt(btn.dataset.ldec, 10);
      btn.addEventListener('click', () => {
        if (logItems[i].value <= 0) return;
        logItems[i].value--;
        document.getElementById(`lv-${i}`).textContent = logItems[i].value;
      });
    });
    document.querySelectorAll('[data-linc]').forEach(btn => {
      const i = parseInt(btn.dataset.linc, 10);
      btn.addEventListener('click', () => {
        logItems[i].value++;
        document.getElementById(`lv-${i}`).textContent = logItems[i].value;
      });
    });
  }

  async function saveLog() {
    const completions = logItems.filter(i => i.value > 0).map(i => ({ sku: i.sku, batches: i.value }));
    if (!completions.length) { alert('Enter at least one completed batch.'); return; }
    const summary = completions.map(c => `${c.sku} ×${c.batches}`).join('\n');
    if (!confirm(`Log completions for ${logDate}?\n\n${summary}`)) return;

    const saveBtn = document.getElementById('log-save');
    saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
    try {
      await appendLog(PRODUCTION_LOG, {
        action:      logType === 'shape' ? 'shape_done' : 'bfp_done',
        date:        logDate,
        completions: JSON.stringify(completions),
        workers:     logWorkers,
        timeStamp:   new Date().toISOString(),
      });
      saveWorkers(logType, logDate, logWorkers);
      document.getElementById('log-overlay').classList.remove('open');
      await loadProduction();
      schedule = buildOptimalSchedule();
      render();
    } catch (e) {
      saveBtn.disabled = false; saveBtn.textContent = 'Save Completions';
      alert('Error saving: ' + e.message);
    }
  }

  // ─── EXTRA / UNSCHEDULED BATCH SHEET ─────────────────────────────────────

  function openExtraSheet(type, dateStr) {
    extraType  = type;
    extraDate  = dateStr;
    extraValue = 1;

    document.getElementById('extra-title').textContent =
      `${type === 'shape' ? 'Shape' : 'BFP'} — Unscheduled Batch`;
    document.getElementById('extra-sub').textContent =
      `${dateStr} · Last-minute or walk-in order`;
    document.getElementById('extra-val').textContent = '1';

    // Populate SKU dropdown
    document.getElementById('extra-sku-select').innerHTML =
      Object.keys(BATCH_SIZES).map(sku => `<option value="${esc(sku)}">${esc(sku)}</option>`).join('');

    document.getElementById('extra-overlay').classList.add('open');
  }

  async function saveExtra() {
    const sku = document.getElementById('extra-sku-select').value;
    if (!sku || extraValue <= 0) { alert('Select a SKU and quantity.'); return; }
    if (!confirm(`Log ${extraValue} extra batch${extraValue !== 1 ? 'es' : ''} of ${sku} for ${extraDate}?`)) return;

    const saveBtn = document.getElementById('extra-save');
    saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
    try {
      await appendLog(PRODUCTION_LOG, {
        action:      extraType === 'shape' ? 'shape_done' : 'bfp_done',
        date:        extraDate,
        completions: JSON.stringify([{ sku, batches: extraValue }]),
        workers:     getWorkers(extraType, extraDate),
        timeStamp:   new Date().toISOString(),
      });
      document.getElementById('extra-overlay').classList.remove('open');
      await loadProduction();
      schedule = buildOptimalSchedule();
      render();
    } catch (e) {
      saveBtn.disabled = false; saveBtn.textContent = 'Save Batch';
      alert('Error saving: ' + e.message);
    }
  }

  // ─── INVENTORY SHEET ──────────────────────────────────────────────────────

  function openInvSheet(dateStr, type) {
    invDate = dateStr; invType = type;
    const isBFP    = type === 'bfp';
    const invKey   = isBFP ? 'frozen' : 'coldFerment';
    const existing = (productionState[dateStr] || {})[invKey] || {};
    document.getElementById('inv-title').textContent = isBFP ? 'Frozen on Hand' : 'Cold Ferment on Hand';
    document.getElementById('inv-sub').textContent   = `As of ${dateStr}`;
    document.getElementById('inv-body').innerHTML    = Object.keys(BATCH_SIZES).map(sku => `
      <div class="inv-input-row">
        <label class="inv-input-lbl" for="ii-${esc(sku)}">${esc(sku)}</label>
        <input class="inv-input" type="number" min="0" id="ii-${esc(sku)}" data-sku="${esc(sku)}" value="${existing[sku] || 0}">
        <span class="inv-input-unit">pretzels</span>
      </div>`).join('');
    document.getElementById('inv-overlay').classList.add('open');
  }

  async function saveInv() {
    const isBFP    = invType === 'bfp';
    const invKey   = isBFP ? 'frozen' : 'coldFerment';
    const otherKey = isBFP ? 'coldFerment' : 'frozen';
    const otherInv = (productionState[invDate] || {})[otherKey] || {};
    const snaps    = [];
    Object.keys(BATCH_SIZES).forEach(sku => {
      const inp   = document.querySelector(`#inv-body [data-sku="${CSS.escape(sku)}"]`);
      const count = parseInt(inp?.value, 10) || 0;
      const other = otherInv[sku] || 0;
      if (count > 0 || other > 0) {
        snaps.push({ sku, coldFerment: isBFP ? other : count, frozen: isBFP ? count : other });
      }
    });
    const saveBtn = document.getElementById('inv-save');
    saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
    try {
      await appendLog(PRODUCTION_LOG, {
        action: 'inventory', date: invDate,
        snapshots: JSON.stringify(snaps), timeStamp: new Date().toISOString(),
      });
      document.getElementById('inv-overlay').classList.remove('open');
      await loadProduction();
      schedule = buildOptimalSchedule();
      render();
    } catch (e) {
      alert('Error saving inventory: ' + e.message);
    } finally {
      saveBtn.disabled = false; saveBtn.textContent = 'Save Inventory';
    }
  }

  // ─── DATA LOADING ─────────────────────────────────────────────────────────

  async function loadDeliveries() {
    const logs = await fetchLog(DELIVERY_LOG);
    allDeliveries = resolveDeliveries(logs);
  }

  async function loadProduction() {
    const logs = await fetchLog(PRODUCTION_LOG);
    productionState = resolveProductionLogs(logs);
  }

  // ─── NAV WIRING ───────────────────────────────────────────────────────────

  document.getElementById('nav-prev').addEventListener('click', () => {
    if (viewMode === 'week') { viewMode = 'day'; }
    else { currentDate = addDays(currentDate, -1); }
    render();
  });
  document.getElementById('nav-next').addEventListener('click', () => {
    if (viewMode === 'week') return;
    currentDate = addDays(currentDate, 1);
    render();
  });
  document.getElementById('date-display').addEventListener('click', () => {
    currentDate = new Date();
    viewMode = 'day';
    render();
  });
  document.getElementById('week-toggle').addEventListener('click', () => {
    viewMode = viewMode === 'week' ? 'day' : 'week';
    render();
  });

  // Log sheet
  document.getElementById('log-save').addEventListener('click', saveLog);
  document.getElementById('log-cancel').addEventListener('click', () =>
    document.getElementById('log-overlay').classList.remove('open'));
  document.getElementById('log-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('log-overlay'))
      document.getElementById('log-overlay').classList.remove('open');
  });

  // Extra sheet
  document.getElementById('extra-save').addEventListener('click', saveExtra);
  document.getElementById('extra-cancel').addEventListener('click', () =>
    document.getElementById('extra-overlay').classList.remove('open'));
  document.getElementById('extra-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('extra-overlay'))
      document.getElementById('extra-overlay').classList.remove('open');
  });
  document.getElementById('extra-dec').addEventListener('click', () => {
    if (extraValue <= 1) return;
    extraValue--;
    document.getElementById('extra-val').textContent = extraValue;
  });
  document.getElementById('extra-inc').addEventListener('click', () => {
    extraValue++;
    document.getElementById('extra-val').textContent = extraValue;
  });

  // Inv sheet
  document.getElementById('inv-save').addEventListener('click', saveInv);
  document.getElementById('inv-cancel').addEventListener('click', () =>
    document.getElementById('inv-overlay').classList.remove('open'));
  document.getElementById('inv-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('inv-overlay'))
      document.getElementById('inv-overlay').classList.remove('open');
  });

  // ─── BOOT ─────────────────────────────────────────────────────────────────

  (async () => {
    try {
      await Promise.all([loadDeliveries(), loadProduction()]);
      schedule = buildOptimalSchedule();
      render();
    } catch (e) {
      document.getElementById('main-view').innerHTML = `
        <div class="load-error">
          ⚠️ Could not load data<br>
          <span style="font:400 13px 'Manrope',sans-serif">${esc(e.message)}</span><br><br>
          <button onclick="window.location.reload()"
            style="padding:12px 28px;background:var(--red);color:#fff;border:none;border-radius:8px;font:700 15px 'Manrope',sans-serif;cursor:pointer;min-height:48px">
            Retry
          </button>
        </div>`;
    }
  })();
</script>
</body>
</html>
