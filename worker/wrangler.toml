name = "dpc-catering-checkout"
main = "src/index.js"
compatibility_date = "2025-01-01"
account_id = "f399e3bcd5ea1501830d0ad1d35d9da3"

[vars]
SQUARE_LOCATION_ID = "LEJ3PDZ9V6NYN"
SQUARE_ENV = "production"
# From-address for FOH calendar invites. Domain must be verified at
# resend.com/domains; until then sends fail with 403 (no harm — KV stays
# empty and cron retries every 30min). Change the local-part if you want
# a different display name (it just appears as ORGANIZER in the invite).
FOH_CAL_FROM = "DPC Production Schedule <noreply@dangerouspretzel.com>"

# Tracks which calendar events we've already invited getdangerous@myecalendar.com
# to. Each VEVENT UID -> { sequence, contentHash, summary, status }. Without
# this, the cron would re-send invites every run.
[[kv_namespaces]]
binding = "FOH_CAL_STATE"
id = "3f111dbe5ac44c7e9b168f8049754b22"

# Cron — every 30 min. Sends new/changed events as METHOD:REQUEST and
# disappeared events as METHOD:CANCEL to getdangerous@myecalendar.com.
# DISABLED 2026-05-06: Resend's MIME structure (attachment-only) isn't being
# recognized by myecalendar. Investigating proper iMIP via raw-MIME provider
# (Mailgun) OR pivot to Google Calendar share. Re-enable once delivery works.
[triggers]
crons = []
